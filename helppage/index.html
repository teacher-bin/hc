    <style>
        /* Noto Sans KR 폰트를 기본 폰트로 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 배경 래퍼 */
        .bg-nature-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(180deg, #eaf5f0 0%, #f2f8f5 15%, #f7faf9 40%, #f4f9f6 70%, #eef6f1 100%);
        }
        .bg-nature-wrap > div, .bg-nature-wrap > svg {
            position: absolute;
        }
        /* 왼쪽 상단 산 장식 */
        .bg-mountain-left {
            top: 0; left: 0;
            width: 350px; height: 300px;
        }
        /* 오른쪽 상단 산 장식 */
        .bg-mountain-right {
            top: 0; right: 0;
            width: 300px; height: 280px;
        }
        /* 왼쪽 하단 장식 */
        .bg-bottom-left {
            bottom: 0; left: 0;
            width: 400px; height: 300px;
        }
        /* 오른쪽 하단 장식 */
        .bg-bottom-right {
            bottom: 0; right: 0;
            width: 380px; height: 280px;
        }
        /* 중간 좌측 장식 */
        .bg-mid-left {
            top: 40%; left: 0;
            width: 200px; height: 250px;
            transform: translateY(-50%);
        }
        /* 중간 우측 장식 */
        .bg-mid-right {
            top: 45%; right: 0;
            width: 180px; height: 220px;
            transform: translateY(-50%);
        }
        /* 학교 일러스트 */
        .school-illustration {
            position: absolute;
            top: 40px;
            right: 80px;
            width: 140px;
            height: 140px;
            z-index: 1;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .school-illustration {
                width: 90px; height: 90px;
                top: 20px; right: 20px;
            }
            .bg-mountain-left { width: 200px; height: 180px; }
            .bg-mountain-right { width: 180px; height: 160px; }
            .bg-bottom-left { width: 250px; height: 200px; }
            .bg-bottom-right { width: 230px; height: 180px; }
            .bg-mid-left { width: 120px; height: 160px; }
            .bg-mid-right { width: 110px; height: 140px; }
        }
        /* 카드 등장 애니메이션 */
        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            60% {
                opacity: 1;
                transform: translateY(-6px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .card-entrance {
            opacity: 0;
            animation: cardEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 스프링 바운스 슬라이드 애니메이션 */
        .slide-content {
            display: grid;
            grid-template-rows: 0fr;
            opacity: 0;
            transform: translateY(-8px);
            transition: grid-template-rows 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.3s ease,
                        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .slide-content > * {
            overflow: hidden;
        }
        .slide-content.open {
            grid-template-rows: 1fr;
            opacity: 1;
            transform: translateY(0);
            transition: grid-template-rows 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s ease 0.05s,
                        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>

    <header class="relative" style="z-index:2;">

                학교 업무에 필요한 자료를 쉽게 찾아보세요!

    <main class="max-w-6xl mx-auto px-4 py-8">

                    class="w-full p-6 text-left flex items-center justify-between hover:bg-gray-50 transition-colors duration-200 rounded-t-lg"
                >
                    <div class="flex items-center">

                            <p class="text-sm text-gray-600">유치원 관련 업무자료</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-down text-gray-400 transition-transform duration-200" id="kindergarten-arrow"></i>
                </button>

                                        oninput="searchKindergarten()"
                                    >
                                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                                </div>
                            </div>
                            <div id="kindergarten-sections" class="p-4"></div>
                        </div>
                    </div>

    <script>
    // 부모 프레임의 다크모드/라이트모드 감지
    function syncTheme() {
        if (window.parent && window.parent.document.body) {
            if (window.parent.document.body.classList.contains('dark-mode')) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }
    }
    window.addEventListener('message', (e) => {
        if (e.data === 'theme-toggled') syncTheme();
    });
    // 초기 동기화
    syncTheme();
    // 부모 속성 감시 (옵저버)
    if (window.parent && window.parent.document.body) {
        const observer = new MutationObserver(syncTheme);
        observer.observe(window.parent.document.body, { attributes: true, attributeFilter: ['class'] });
    }

    // iframe 높이 조절
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight, document.body.offsetHeight, document.documentElement.offsetHeight);
        if (window.parent) {
            window.parent.postMessage({ type: 'resize', height: h }, '*');
        }
    }
    window.addEventListener('load', sendHeight);
    document.addEventListener('click', () => setTimeout(sendHeight, 550));
    const heightObserver = new MutationObserver(sendHeight);
    heightObserver.observe(document.body, { childList: true, subtree: true, attributes: true });
    </script>
